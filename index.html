<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Google Web App</title>
    <style>
        /* ตั้งค่าให้แสดงผลเต็มหน้าจอและไม่มีขอบ */

            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* ป้องกันการเกิด Scrollbar ซ้อนกัน */
            background-color: #f4f4f9; /* สีพื้นหลังเผื่อโหลดช้า */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbxoUIQC0kYlbCzSdzEp6HFtZOQgjH2BWyYrw9eNUBiriZ0V4gVL1_KBuqn_PkzMLwEg/exec"

</html>
