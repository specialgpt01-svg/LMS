<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08070f" />
  <title>ห้องเรียนออนไลน์ สกร.</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #08070f;
    }

    .app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #08070f;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #c4b5fd;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: radial-gradient(circle at 50% 20%, #16152a 0%, #08070f 62%);
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="loading">กำลังเปิดระบบห้องเรียนออนไลน์...</div>
  <iframe
    class="app-frame"
    src="https://script.google.com/macros/s/AKfycbzTzwYnbdkJrYACCD4qQ9wVAVMYTJRY4V-EaxyJs3wyYYad0M6fP0E--GT8-X4nJAI1/exec"
    allow="geolocation; camera; microphone; fullscreen"
    allowfullscreen>
  </iframe>
</body>
</html>
